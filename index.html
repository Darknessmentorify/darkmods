<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARKMODS PRO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #060b1a, #000000);
    color: #e6f1ff;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: rgba(5,10,25,0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #00f0ff33;
    box-shadow: 0 0 30px #00f0ff33;
}

.logo-text {
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 2px;
    background: linear-gradient(90deg,#00f0ff,#ff00c8,#00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px #00f0ff88;
}

/* SALDO */
#saldoBox {
    margin-top: 12px;
    padding: 12px;
    border-radius: 20px;
    background: linear-gradient(90deg,#00f0ff,#0088ff);
    box-shadow: 0 0 20px #00f0ff88;
    animation: glow 2s infinite alternate;
}

/* BOTONES */
.btn {
    width: 90%;
    padding: 14px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg,#00f0ff,#0088ff);
    color: white;
    font-weight: bold;
    margin: 10px auto;
    display: block;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #00f0ff66;
}

.btn:hover {
    transform: scale(1.07);
    box-shadow: 0 0 30px #00f0ff;
    background: linear-gradient(90deg,#00ffcc,#0099ff);
}

/* CARDS */
.card {
    background: rgba(10,15,35,0.85);
    margin: 20px;
    padding: 15px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    border: 1px solid #00f0ff22;
    box-shadow: 0 0 25px #00f0ff22;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}



.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 35px #00f0ff88;
}

.card img {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 10px;
}
}

/* INPUTS */
input, select {
    width: 90%;
    padding: 10px;
    margin: 8px auto;
    display: block;
    border-radius: 10px;
    border: 1px solid #00f0ff33;
    background: #050a1a;
    color: white;
}

/* POPUP */
.popup {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#000000ee;
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box {
    background: rgba(10,15,35,0.95);
    padding:25px;
    border-radius:20px;
    width:90%;
    box-shadow: 0 0 40px #00f0ff55;
}

/* LOGIN */
#loginBox {
    background: rgba(10,15,35,0.9);
    margin: 40px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 35px #00f0ff33;
}

@keyframes glow {
    from { box-shadow: 0 0 10px #00f0ff66; }
    to { box-shadow: 0 0 25px #00f0ff; }
}
    /* BOTONES ADMIN */
.admin-btn {
    padding: 10px;
    border: none;
    border-radius: 10px;
    margin: 5px 5px 0 0;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    color: white;
}

/* Aprobar */
.btn-aprobar {
    background: linear-gradient(90deg,#00ff88,#00cc66);
    box-shadow: 0 0 10px #00ff88;
}

.btn-aprobar:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00ff88;
}

/* Rechazar */
.btn-rechazar {
    background: linear-gradient(90deg,#ff0055,#ff0033);
    box-shadow: 0 0 10px #ff0055;
}

.btn-rechazar:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #ff0055;
}
    /* HEADER PRO */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

/* BOTONES MINI */
.mini-btn {
    background: rgba(0,255,255,0.1);
    border: 1px solid #00f0ff55;
    color: #00f0ff;
    font-size: 18px;
    padding: 10px 12px;
    border-radius: 12px;
    margin-left: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.mini-btn:hover {
    background: #00f0ff;
    color: black;
    box-shadow: 0 0 15px #00f0ff;
    transform: scale(1.1);
}

/* BOTÓN SALIR */
.logout {
    border-color: #ff0055;
    color: #ff0055;
}

.logout:hover {
    background: #ff0055;
    color: white;
    box-shadow: 0 0 15px #ff0055;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="text-align:center;padding:30px;">
<h2>DARKMODS LOGIN</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button class="btn" onclick="register()">Registrarse</button>
<button class="btn" onclick="login()">Entrar</button>
</div>

<!-- TIENDA -->
<div id="tienda" style="display:none;">

<header>
<div class="logo-text">DARK MODS STORE</div>

<div class="top-bar">
    <div id="saldoBox">💰 $<span id="saldo">0</span></div>

    <div>
        <button class="mini-btn" onclick="openRecarga()">💳</button>
        <button id="adminBtn" class="mini-btn" onclick="openAdmin()" style="display:none;">⚙</button>
        <button class="mini-btn logout" onclick="logout()">⎋</button>
    </div>
</div>

</header>

<!-- PRODUCTOS -->
<div class="card">

<img src="https://i.ibb.co/N6N17FZ9/file-00000000754871fdac971d7dd6d83797.png">
<h3>Pato Verde</h3>
<select><option>30 días - $9</option></select>
<button class="btn" onclick="comprar('Pato Verde', this.previousElementSibling)">Comprar</button>

<div class="card">
<img src="https://i.ibb.co/S452bBGY/file-000000006dcc71fdae84c3923e4ab800.png">
<h3>HG Cheat</h3>
<select>
<option>1 día - $1</option>

</select>
<button class="btn" onclick="comprar('HG Cheat', this.previousElementSibling)">Comprar</button>
</div>

<div class="card">
<img src="https://i.ibb.co/6RSxCpp1/file-00000000a67471fdae61df21df5fe808.png">
<h3>Metodo de Seguidores likes y vistas</h3>
<select>
<option>Acceso completo - $25</option>
</select>
<button class="btn" onclick="comprar('Metodo de Seguidores likes y vistas', this.previousElementSibling)">Comprar</button>
</div>

<div class="card">
<img src="https://i.ibb.co/qMRHTcML/file-00000000365c71f89c9d4857760f75e6.png">
<h3>Toma foto desde su celular</h3>
<select>
<option>Acceso completo - $50</option>
</select>
<button class="btn" onclick="comprar('Toma foto desde su celular', this.previousElementSibling)">Comprar</button>
</div>

<div class="card">
<img src="https://i.ibb.co/spzBMnwC/file-00000000cc1871fdba128271d39f0544.png">
<h3>Números virtuales para todos los países</h3>
<select>
<option>Acceso completo - $12</option>
</select>
<button class="btn" onclick="comprar('Números virtuales para todos los países', this.previousElementSibling)">Comprar</button>
</div>

<div class="card">
<a href="https://t.me/darknesskeys_bot" class="btn">Ir al bot de Telegram</a>
</div>

</div>

<!-- TODO TU SCRIPT ORIGINAL SIGUE IGUAL -->

</div>

<!-- RECARGA -->
<div id="popup" class="popup">
<div class="popup-box">
<h3>Recargar saldo</h3>
<p>ZELLE / PAYPAL</p>
<p>alvarengalopezj50@gmail.com</p>

<input id="montoRecarga">
<input id="referencia">
<input type="file" id="comprobante">

<button class="btn" onclick="enviarRecarga()">Enviar</button>
<button class="btn" onclick="cerrarRecarga()">Cerrar</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;">
<h2>ADMIN PANEL</h2>
<div id="lista"></div>
<button class="btn" onclick="volver()">Volver</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, increment, addDoc, collection, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyDQX-pK3dzrQoAd9hH2PlCoAUVQfUYZfuc",
  authDomain: "darkmods-6949a.firebaseapp.com",
  projectId: "darkmods-6949a"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const ADMIN_UID = "DbPBD2NjDHWsFZ3qDPRnHzM4EAA3";

window.register = ()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=>signOut(auth);

onAuthStateChanged(auth,(user)=>{
  adminBtn.style.display="none";

  if(user){
    loginBox.style.display="none";
    tienda.style.display="block";

    if(user.uid===ADMIN_UID){
      adminBtn.style.display="block";
    }

    const refUser = doc(db,"users",user.uid);
    onSnapshot(refUser,(snap)=>{
      if(snap.exists()){
        saldo.innerText = snap.data().saldo || 0;
      }
    });

  } else {
    loginBox.style.display="block";
    tienda.style.display="none";
  }
});

window.openRecarga = ()=> popup.style.display="flex";
window.cerrarRecarga = ()=> popup.style.display="none";

window.enviarRecarga = async ()=>{
  const user = auth.currentUser;
  const file = comprobante.files[0];

  let url="";
  if(file){
    const storageRef = ref(storage,"comprobantes/"+Date.now());
    await uploadBytes(storageRef,file);
    url = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db,"pagos"),{
    email:user.email,
    uid:user.uid,
    monto:Number(montoRecarga.value),
    referencia:referencia.value,
    comprobante:url,
    estado:"pendiente"
  });

  alert("Enviado 🔥");
  cerrarRecarga();
};

window.comprar = async (nombre, select)=>{
  const user = auth.currentUser;
  const precio = Number(select.value.match(/\$(\d+)/)[1]);

  const refUser = doc(db,"users",user.uid);
  const snap = await getDoc(refUser);

  let saldoActual = snap.exists() ? snap.data().saldo || 0 : 0;

  if(saldoActual < precio){
    return alert("Saldo insuficiente ❌");
  }

  await setDoc(refUser,{saldo:increment(-precio)},{merge:true});

  await addDoc(collection(db,"pagos"),{
    email:user.email,
    producto:nombre,
    monto:precio,
    tipo:"compra",
    estado:"aprobado"
  });

  alert("Compra realizada 🔥");
};

window.openAdmin = async ()=>{
  const snap = await getDocs(collection(db,"pagos"));
  lista.innerHTML="";

  snap.forEach(d=>{
    const p = d.data();

    lista.innerHTML+=`
    <div class="card">
    ${p.email}<br>
    ${p.producto || "RECARGA"}<br>
    $${p.monto}<br>
    ${p.estado}<br>

  <button class="admin-btn btn-aprobar" onclick="aprobar('${d.id}')">✔ Aprobar</button>
<button class="admin-btn btn-rechazar" onclick="rechazar('${d.id}')">✖ Rechazar</button>
    `;
  });

  tienda.style.display="none";
  adminPanel.style.display="block";
};

window.aprobar = async(id)=>{
  const pagos = await getDocs(collection(db,"pagos"));
  let data;

  pagos.forEach(d=>{
    if(d.id===id) data = d.data();
  });

  await updateDoc(doc(db,"pagos",id),{estado:"aprobado"});

  if(!data.tipo){
    await setDoc(doc(db,"users",data.uid),{
      saldo: increment(data.monto)
    },{merge:true});
  }

  openAdmin();
};

window.rechazar = async(id)=>{
  await updateDoc(doc(db,"pagos",id),{estado:"rechazado"});
  openAdmin();
};

window.volver = ()=>{
  adminPanel.style.display="none";
  tienda.style.display="block";
};

</script>

</body>
</html>
